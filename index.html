<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeZ Studios</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: #0d0d0d;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ANA EKRAN */
        .banner {
            width: 100%;
            height: 180px;
            background: #111;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #555;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .main-btn:active {
            opacity: 0.8;
        }

        /* MAVİ KUTU (SATIN AL / MODLAR) */
        .btn-blue {
            background-color: #0066ff;
            color: white;
        }

        /* TURUNCU KUTULAR (KATEGORİLER) */
        .btn-orange {
            background-color: #ff6600;
            color: white;
        }

        /* ARAMA VE BAŞLIK */
        .title {
            text-align: center;
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* MOD KARTLARI */
        .mod-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mod-card {
            background-color: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .mod-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mod-img {
            width: 50px;
            height: 50px;
            background-color: #222;
            border-radius: 6px;
            object-fit: cover;
        }

        .mod-title {
            font-size: 15px;
            font-weight: 600;
        }

        /* İSTATİSTİKLER (İNDİRME VE BEĞENİ) */
        .mod-stats {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            color: #aaa;
            text-align: right;
        }

        .stat-item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888;
            width: 100%;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        /* İNDİRME DETAY EKRANI */
        .detail-card {
            background-color: #161616;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .detail-img {
            width: 100%;
            height: 180px;
            background-color: #222;
            border-radius: 6px;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .detail-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            font-size: 14px;
            color: #ccc;
        }

        .download-btn {
            background-color: #28a745;
            color: white;
            text-decoration: none;
            display: block;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- 1. ANA EKRAN -->
    <div id="homeScreen" class="screen active">
        <div class="banner">BANNER / LOGO</div>
        <!-- MAVİ KUTU -->
        <button class="main-btn btn-blue" onclick="sayfaAc('kategorilerScreen')">SATIN AL / MODLAR</button>
    </div>

    <!-- 2. KATEGORİLER -->
    <div id="kategorilerScreen" class="screen">
        <h2 class="title">KATEGORİLER</h2>
        <!-- TURUNCU KUTULAR -->
        <button class="main-btn btn-orange" onclick="kategoriYukle('addons', 'ADDONS')">ADDONS</button>
        <button class="main-btn btn-orange" onclick="kategoriYukle('maps', 'HARİTALAR')">HARİTALAR</button>
        <button class="main-btn btn-orange" onclick="kategoriYukle('textures', 'DOKU PAKETLERİ')">DOKU PAKETLERİ</button>
        <button class="back-btn" onclick="sayfaAc('homeScreen')">← Ana Sayfaya Dön</button>
    </div>

    <!-- 3. MOD LİSTESİ VE ARAMA -->
    <div id="listScreen" class="screen">
        <h2 id="listTitle" class="title">MODLAR</h2>
        <input type="text" class="search-box" id="searchInput" placeholder="Search... 🔍" onkeyup="modAra()">
        <div class="mod-list" id="modContainer"></div>
        <button class="back-btn" onclick="sayfaAc('kategorilerScreen')">← Kategorilere Dön</button>
    </div>

    <!-- 4. İNDİRME SAYFASI -->
    <div id="detailScreen" class="screen">
        <div class="detail-card">
            <img id="detailImg" class="detail-img" src="" alt="Mod Görseli">
            <h3 id="detailTitle">Mod Adı</h3>
            
            <!-- DETAY SAYFASINDAKİ BEĞENİ VE İNDİRME SAYISI -->
            <div class="detail-stats">
                <span id="detailDownloads">📥 0 İndirme</span>
                <span id="detailLikes">❤️ 0 Beğeni</span>
            </div>

            <a id="downloadLink" class="download-btn" href="#" target="_blank">İNDİR / SATIN AL</a>
        </div>
        <button class="back-btn" onclick="sayfaAc('listScreen')">← Listeye Dön</button>
    </div>

</div>

<script>
    // ==========================================
    // MOD LİSTESİ (İstediğin Modu Buraya Ekle)
    // ==========================================
    const modlar = [
        {
            id: 1,
            ad: "Spider-Man Addon",
            kategori: "addons",
            resim: "https://via.placeholder.com/60/ff0000/ffffff?text=Spider",
            indirme: 1420,
            begeni: 350,
            indirLink: "https://example.com/spiderman"
        },
        {
            id: 2,
            ad: "Dynamic Light",
            kategori: "addons",
            resim: "https://via.placeholder.com/60/ffaa00/ffffff?text=Light",
            indirme: 890,
            begeni: 210,
            indirLink: "https://example.com/dynamic-light"
        },
        {
            id: 3,
            ad: "Modern City Map",
            kategori: "maps",
            resim: "https://via.placeholder.com/60/00aa00/ffffff?text=City",
            indirme: 2300,
            begeni: 950,
            indirLink: "https://example.com/city-map"
        }
    ];

    let aktifKategori = '';

    function sayfaAc(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function kategoriYukle(kat, baslik) {
        aktifKategori = kat;
        document.getElementById('listTitle').innerText = baslik;
        document.getElementById('searchInput').value = '';
        modLisesiniCiz(modlar.filter(m => m.kategori === kat));
        sayfaAc('listScreen');
    }

    function modLisesiniCiz(liste) {
        const container = document.getElementById('modContainer');
        container.innerHTML = '';

        if(liste.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#666;">Mod bulunamadı.</p>';
            return;
        }

        liste.forEach(m => {
            const card = document.createElement('div');
            card.className = 'mod-card';
            card.onclick = () => detayAc(m);
            card.innerHTML = `
                <div class="mod-info">
                    <img src="${m.resim}" class="mod-img" alt="icon">
                    <span class="mod-title">${m.ad}</span>
                </div>
                <div class="mod-stats">
                    <div class="stat-item">📥 ${m.indirme}</div>
                    <div class="stat-item">❤️ ${m.begeni}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function modAra() {
        const metin = document.getElementById('searchInput').value.toLowerCase();
        const filtrelenmis = modlar.filter(m => 
            m.kategori === aktifKategori && m.ad.toLowerCase().includes(metin)
        );
        modLisesiniCiz(filtrelenmis);
    }

    function detayAc(mod) {
        document.getElementById('detailTitle').innerText = mod.ad;
        document.getElementById('detailImg').src = mod.resim;
        document.getElementById('detailDownloads').innerText = `📥 ${mod.indirme} İndirme`;
        document.getElementById('detailLikes').innerText = `❤️ ${mod.begeni} Beğeni`;
        document.getElementById('downloadLink').href = mod.indirLink;
        sayfaAc('detailScreen');
    }
</script>

</body>
</html>
